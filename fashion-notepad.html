<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adora Notes</title>
  <style>
    :root { --ink:#27231f; --paper:#f9f6f0; --cream:#eee7dc; --accent:#b65f47; --deep:#743b2c; --line:#ddd3c5; --muted:#797069; --white:#fffdf9; }
    * { box-sizing:border-box; } body { margin:0; color:var(--ink); font-family:Arial, sans-serif; background:var(--paper); }
    .serif { font-family:Georgia, 'Times New Roman', serif; }
    header { min-height:78px; display:flex; align-items:center; justify-content:space-between; padding:0 clamp(18px,4vw,42px); border-bottom:1px solid var(--line); background:#fcfaf6; }
    .brand { font:700 27px Georgia,serif; letter-spacing:-1px; } .brand span { color:var(--accent); font-style:italic; font-weight:400; }
    .save-state { font-size:13px; color:var(--muted); display:flex; align-items:center; gap:8px; }.dot{width:8px;height:8px;border-radius:50%;background:#6d9873;}
    main { display:grid; grid-template-columns:270px minmax(0,1fr); min-height:calc(100vh - 78px); }
    aside { padding:28px 20px; border-right:1px solid var(--line); background:#f4efe7; }
    .new-client { width:100%; border:0; border-radius:5px; background:var(--accent); color:white; padding:13px; font-weight:bold; cursor:pointer; font-size:14px; }
    .new-client:hover,.primary:hover { background:var(--deep); }
    .search { width:100%; margin:22px 0 14px; border:1px solid var(--line); border-radius:5px; padding:11px; background:var(--white); color:var(--ink); }
    .label { color:var(--muted); font-size:11px; font-weight:bold; letter-spacing:1px; text-transform:uppercase; margin:13px 9px 8px; }
    #clientList { display:grid; gap:5px; }.client-item { width:100%; border:0; background:transparent; text-align:left; padding:12px 10px; border-radius:5px; cursor:pointer; color:var(--ink); }.client-item:hover,.client-item.active { background:#e5d8cc; }.client-item b{display:block;font-size:14px}.client-item small{color:var(--muted);font-size:12px}
    .empty-list { font-size:13px; color:var(--muted); padding:12px 9px; line-height:1.5; }
    section { padding:clamp(24px,4vw,48px) clamp(18px,5vw,48px) 60px; max-width:1320px; width:100%; margin:auto; }.top { display:flex; justify-content:space-between; align-items:start; gap:20px; }.eyebrow { font-size:11px; letter-spacing:1.3px; color:var(--accent); font-weight:bold; text-transform:uppercase; margin-bottom:8px; }.title-input { border:0; border-bottom:1px solid transparent; background:transparent; font:700 clamp(29px,4vw,37px) Georgia,serif; color:var(--ink); padding:0; width:500px; max-width:100%; }.title-input:focus{outline:none;border-color:var(--line)}
    .actions { display:flex; flex-wrap:wrap; gap:10px; }.secondary,.primary { cursor:pointer; border-radius:5px; padding:10px 13px; font-size:13px; font-weight:bold; min-height:40px; }.secondary { border:1px solid var(--line); background:var(--white); color:var(--ink); }.primary { border:0; background:var(--accent); color:white; }
    .grid { display:grid; grid-template-columns:minmax(0,.95fr) minmax(0,1.25fr); gap:clamp(18px,3vw,26px); margin-top:29px; }.card { min-width:0; background:var(--white); border:1px solid var(--line); border-radius:8px; overflow:hidden; }.card-head { padding:18px 20px 15px; border-bottom:1px solid var(--cream); display:flex; align-items:center; justify-content:space-between; gap:12px; }.card-head h2{margin:0;font:700 20px Georgia,serif}.card-head span{font-size:12px;color:var(--muted);text-align:right}
    .client-form { padding:18px 20px; display:grid; grid-template-columns:1fr 1fr; gap:14px; }.field { display:grid; gap:6px; }.field.full{grid-column:1/-1}.field label,.measurements label{font-size:11px;letter-spacing:.8px;text-transform:uppercase;font-weight:bold;color:var(--muted)} input,textarea,select { font:14px Arial,sans-serif; color:var(--ink); border:1px solid var(--line); border-radius:4px; padding:10px; background:#fffefa; width:100%; } textarea { resize:vertical; min-height:74px; }.measurements { padding:19px 20px 22px; }.measurements h3 { margin:0 0 15px;font:700 18px Georgia,serif; }.measure-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }.unit { position:relative; }.unit input{padding-right:28px}.unit em{position:absolute;right:10px;bottom:11px;color:var(--muted);font-size:11px;font-style:normal}
    .sketch-tools { padding:10px 16px; display:flex; align-items:center; justify-content:space-between; background:#fcfaf6; border-bottom:1px solid var(--cream); }.tool-group{display:flex;align-items:center;gap:10px}.tool-group label{font-size:12px;color:var(--muted)} #color{height:30px;width:36px;padding:2px;border-radius:4px} #size{width:86px}.clear{border:0;background:transparent;color:var(--accent);font-weight:bold;cursor:pointer;font-size:12px}.canvas-wrap { padding:16px; background:#f7f2ea; }.canvas-box { background:white; border:1px solid var(--line); border-radius:4px; overflow:hidden; aspect-ratio:1.25; } canvas { display:block; width:100%; height:100%; cursor:crosshair; touch-action:none; }.sketch-foot{padding:12px 17px;color:var(--muted);font-size:12px;}
    .notes { margin-top:26px; }.notes textarea{min-height:104px;border:0;padding:18px;line-height:1.55}.placeholder { text-align:center; padding:92px 20px; color:var(--muted); }.placeholder h1{font:700 31px Georgia,serif;color:var(--ink);margin:0 0 10px}.modal { position:fixed;inset:0;background:rgba(39,35,31,.36);display:none;align-items:center;justify-content:center;padding:20px; }.modal.show{display:flex}.modal-box{width:390px;background:var(--white);padding:28px;border-radius:9px;box-shadow:0 20px 60px #34261d55}.modal-box h2{font:700 25px Georgia,serif;margin:0 0 9px}.modal-box p{font-size:14px;color:var(--muted);line-height:1.5}.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:18px}
    @media(max-width:980px){main{grid-template-columns:1fr}aside{border-right:0;border-bottom:1px solid var(--line);padding:14px 18px;display:grid;grid-template-columns:auto minmax(170px,260px) minmax(0,1fr);gap:12px;align-items:center}.new-client{width:auto;padding:11px 14px;white-space:nowrap}.search{margin:0;width:100%}.label{display:none}#clientList{display:flex;gap:7px;overflow-x:auto;min-width:0;padding:2px 0;scrollbar-width:thin}.client-item{width:auto;min-width:max-content;padding:8px 11px}.client-item small{display:none}.grid{grid-template-columns:minmax(0,1fr) minmax(0,1fr)}}
    @media(max-width:700px){header{min-height:62px}.brand{font-size:23px}.save-state{font-size:11px}.dot{width:7px;height:7px}aside{grid-template-columns:auto minmax(0,1fr);padding:12px}.new-client{font-size:13px}#clientList{grid-column:1/-1}.top{flex-direction:column;gap:16px}.actions{width:100%}.actions button{flex:1}.grid{grid-template-columns:1fr;margin-top:22px}.client-form{grid-template-columns:1fr}.measure-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.canvas-wrap{padding:10px}.sketch-tools{padding:10px;align-items:flex-start;gap:8px}.tool-group{gap:7px;flex-wrap:wrap}.sketch-foot{font-size:11px}.notes{margin-top:18px}}
    @media(max-width:390px){header{padding:0 14px}.save-state span{display:none}section{padding-left:14px;padding-right:14px}.card-head{padding:15px}.card-head h2{font-size:18px}.card-head span{display:none}.client-form,.measurements{padding:15px}.measure-grid{grid-template-columns:1fr}.modal{padding:14px}.modal-box{padding:22px;width:100%}.modal-actions button{flex:1}.sketch-tools{flex-direction:column}.clear{padding:5px 0}.canvas-box{aspect-ratio:1}}
  </style>
</head>
<body>
  <header><div class="brand">Dora <span>Notes</span></div><div class="save-state"><i class="dot"></i><span id="saveStatus">Saved on this device</span></div></header>
  <main>
    <aside><button class="new-client" id="newBtn">+ New client</button><input class="search" id="search" placeholder="Search clients" /><div class="label">Your clients</div><div id="clientList"></div></aside>
    <section id="workspace"><div class="placeholder"><h1>Your fitting room, organized.</h1><p>Create a client card to record measurements, sketch looks, and keep your atelier notes together.</p></div></section>
  </main>
  <div class="modal" id="modal"><div class="modal-box"><h2>New client</h2><p>Start a lasting record for a new fitting.</p><input id="newName" placeholder="Client's full name" autofocus /><div class="modal-actions"><button class="secondary" id="cancel">Cancel</button><button class="primary" id="create">Create card</button></div></div></div>
  <script>
    const KEY='atelier-notes-v1'; let clients=JSON.parse(localStorage.getItem(KEY)||'[]'); let currentId=null, drawing=false, ctx, canvas, last={x:0,y:0};
    const measures=['Bust','Waist','Hip','Shoulder','Arm length','Bicep','Neck','Back length','Inseam','Outseam','Thigh','Wrist'];
    const esc=s=>String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
    function save(){localStorage.setItem(KEY,JSON.stringify(clients));document.getElementById('saveStatus').textContent='Saved on this device';renderList();}
    function current(){return clients.find(c=>c.id===currentId)}
    function renderList(){const q=document.getElementById('search').value.toLowerCase();const list=document.getElementById('clientList');const view=clients.filter(c=>c.name.toLowerCase().includes(q));list.innerHTML=view.length?view.map(c=>`<button class="client-item ${c.id===currentId?'active':''}" data-id="${c.id}"><b>${esc(c.name)}</b><small>${c.updated||'New record'}</small></button>`).join(''):'<div class="empty-list">No client records yet.</div>';list.querySelectorAll('[data-id]').forEach(b=>b.onclick=()=>openClient(b.dataset.id));}
    function openClient(id){currentId=id;const c=current(); document.getElementById('workspace').innerHTML=`<div class="top"><div><div class="eyebrow">Client fitting record</div><input class="title-input" id="title" value="${esc(c.name)}" /></div><div class="actions"><button class="secondary" id="delete">Delete</button><button class="primary" id="save">Save record</button></div></div><div class="grid"><div><div class="card"><div class="card-head"><h2>Client details</h2><span>Fitting & contact</span></div><div class="client-form"><div class="field"><label>Phone</label><input id="phone" value="${esc(c.phone)}" placeholder="+234 …" /></div><div class="field"><label>Email</label><input id="email" value="${esc(c.email)}" placeholder="client@email.com" /></div><div class="field"><label>Garment type</label><input id="garment" value="${esc(c.garment)}" placeholder="e.g. Evening gown" /></div><div class="field"><label>Fitting date</label><input id="date" type="date" value="${esc(c.date)}" /></div><div class="field full"><label>Style notes</label><textarea id="style" placeholder="Fabric, colour preferences, fit notes…">${esc(c.style)}</textarea></div></div></div><div class="card" style="margin-top:26px"><div class="card-head"><h2>Measurements</h2><span>in centimeters</span></div><div class="measurements"><div class="measure-grid">${measures.map(m=>`<div class="unit"><label>${m}</label><input data-measure="${m}" inputmode="decimal" value="${esc(c.measurements[m])}" placeholder="—"/><em>cm</em></div>`).join('')}</div></div></div></div><div><div class="card"><div class="card-head"><h2>Design sketch</h2><span>Draw directly on the page</span></div><div class="sketch-tools"><div class="tool-group"><label>Ink</label><input id="color" type="color" value="#49342d"><label>Line</label><input id="size" type="range" min="1" max="14" value="3"></div><button class="clear" id="clear">Clear sketch</button></div><div class="canvas-wrap"><div class="canvas-box"><canvas id="canvas"></canvas></div></div><div class="sketch-foot">Tip: use a stylus, mouse, or finger to sketch.</div></div><div class="card notes"><div class="card-head"><h2>Atelier notes</h2><span>Private to your studio</span></div><textarea id="notes" placeholder="Alterations, fittings, delivery notes…">${esc(c.notes)}</textarea></div></div></div>`; renderList();bind();}
    function bind(){document.getElementById('save').onclick=saveCurrent;document.getElementById('delete').onclick=deleteCurrent;canvas=document.getElementById('canvas');setupCanvas();['pointerdown','pointermove','pointerup','pointerleave'].forEach(e=>canvas.addEventListener(e,draw));document.getElementById('clear').onclick=()=>{ctx.clearRect(0,0,canvas.width,canvas.height);saveSketch();};}
    function setupCanvas(){const box=canvas.parentElement, r=box.getBoundingClientRect(), c=current();canvas.width=Math.round(r.width*devicePixelRatio);canvas.height=Math.round(r.height*devicePixelRatio);ctx=canvas.getContext('2d');ctx.scale(devicePixelRatio,devicePixelRatio);if(c.sketch){let im=new Image();im.onload=()=>ctx.drawImage(im,0,0,r.width,r.height);im.src=c.sketch;}}
    function pos(e){let r=canvas.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top}}
    function draw(e){if(e.type==='pointerdown'){drawing=true;last=pos(e);canvas.setPointerCapture(e.pointerId);return}if(!drawing)return;if(e.type==='pointerup'||e.type==='pointerleave'){drawing=false;saveSketch();return}let p=pos(e);ctx.beginPath();ctx.moveTo(last.x,last.y);ctx.lineTo(p.x,p.y);ctx.strokeStyle=document.getElementById('color').value;ctx.lineWidth=document.getElementById('size').value;ctx.lineCap='round';ctx.stroke();last=p;}
    function saveSketch(){if(current())current().sketch=canvas.toDataURL('image/png');}
    function saveCurrent(){const c=current();c.name=document.getElementById('title').value.trim()||'Untitled client';['phone','email','garment','date','style','notes'].forEach(k=>c[k]=document.getElementById(k).value);c.measurements={};document.querySelectorAll('[data-measure]').forEach(i=>c.measurements[i.dataset.measure]=i.value);c.updated='Updated '+new Date().toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'});save();}
    function deleteCurrent(){if(confirm(`Delete ${current().name}'s record? This cannot be undone.`)){clients=clients.filter(c=>c.id!==currentId);currentId=null;save();document.getElementById('workspace').innerHTML='<div class="placeholder"><h1>Record removed.</h1><p>Create or select a client to continue.</p></div>';}}
    document.getElementById('newBtn').onclick=()=>{document.getElementById('modal').classList.add('show');setTimeout(()=>document.getElementById('newName').focus(),0)};document.getElementById('cancel').onclick=()=>document.getElementById('modal').classList.remove('show');function create(){let n=document.getElementById('newName');let name=n.value.trim();if(!name)return n.focus();let c={id:crypto.randomUUID(),name,phone:'',email:'',garment:'',date:new Date().toISOString().slice(0,10),style:'',notes:'',measurements:{},sketch:'',updated:'Just now'};clients.unshift(c);currentId=c.id;n.value='';document.getElementById('modal').classList.remove('show');save();openClient(c.id);}document.getElementById('create').onclick=create;document.getElementById('newName').onkeydown=e=>{if(e.key==='Enter')create()};document.getElementById('search').oninput=renderList;renderList();if(clients.length)openClient(clients[0].id);
  </script>
  <script>
(() => {
  const TRASH_KEY = "atelier-notes-trash-v1";
  const CUSTOM_MEASURES_KEY = "atelier-notes-custom-measures-v1";
  const TEN_DAYS = 10 * 24 * 60 * 60 * 1000;

  function readStorage(key, fallback) {
    try {
      return JSON.parse(localStorage.getItem(key)) || fallback;
    } catch {
      return fallback;
    }
  }

  let trash = readStorage(TRASH_KEY, []);
  const customMeasures = readStorage(CUSTOM_MEASURES_KEY, []);

  // Permanently remove items that have stayed in the Bin for 10 days.
  function purgeExpiredTrash() {
    const now = Date.now();
    trash = trash.filter(record => now - record.deletedAt < TEN_DAYS);
    localStorage.setItem(TRASH_KEY, JSON.stringify(trash));
  }

  function saveTrash() {
    purgeExpiredTrash();
    localStorage.setItem(TRASH_KEY, JSON.stringify(trash));
    refreshBinButton();
  }

  // Add saved custom measurements to the app's existing measurement list.
  customMeasures.forEach(name => {
    if (typeof name === "string" && name.trim() && !measures.includes(name.trim())) {
      measures.push(name.trim());
    }
  });

  function addMeasurementInput(name) {
    const grid = document.querySelector(".measure-grid");
    if (!grid) return;

    const unit = document.createElement("div");
    unit.className = "unit";

    const label = document.createElement("label");
    label.textContent = name;

    const input = document.createElement("input");
    input.setAttribute("data-measure", name);
    input.setAttribute("inputmode", "decimal");
    input.placeholder = "—";

    const cm = document.createElement("em");
    cm.textContent = "cm";

    unit.append(label, input, cm);
    grid.appendChild(unit);
  }

  function installMeasurementButton() {
    const measurementSection = document.querySelector(".measurements");
    if (!measurementSection || document.getElementById("addMeasurementOption")) return;

    const button = document.createElement("button");
    button.id = "addMeasurementOption";
    button.type = "button";
    button.textContent = "+ Add measurement option";

    button.addEventListener("click", () => {
      const enteredName = prompt("Name this new measurement option (example: Calf):");
      const name = enteredName?.trim();

      if (!name) return;

      if (measures.some(item => item.toLowerCase() === name.toLowerCase())) {
        alert("That measurement option already exists.");
        return;
      }

      measures.push(name);
      customMeasures.push(name);
      localStorage.setItem(CUSTOM_MEASURES_KEY, JSON.stringify(customMeasures));

      addMeasurementInput(name);
    });

    measurementSection.appendChild(button);
  }

  // Replaces the existing permanent-delete action with a 10-day recoverable Bin.
  deleteCurrent = function () {
    const client = current();

    if (!client) return;

    const shouldDelete = confirm(
      `Move ${client.name}'s measurement record to the Bin?\n\nYou can restore it for the next 10 days.`
    );

    if (!shouldDelete) return;

    const index = clients.findIndex(clientRecord => clientRecord.id === currentId);

    if (index === -1) return;

    const [removedClient] = clients.splice(index, 1);

    trash.unshift({
      ...removedClient,
      deletedAt: Date.now()
    });

    currentId = null;
    saveTrash();
    save();

    document.getElementById("workspace").innerHTML = `
      <div class="placeholder">
        <h1>Record moved to Bin.</h1>
        <p>You can restore it within 10 days.</p>
      </div>
    `;
  };

  function refreshBinButton() {
    const binButton = document.getElementById("openBinButton");

    if (binButton) {
      binButton.textContent = `Bin (${trash.length})`;
    }
  }

  function showBin() {
    purgeExpiredTrash();
    currentId = null;
    renderList();

    const workspace = document.getElementById("workspace");

    if (!trash.length) {
      workspace.innerHTML = `
        <div class="placeholder">
          <h1>Your Bin is empty.</h1>
          <p>Deleted client measurement records stay here for 10 days.</p>
        </div>
      `;
      return;
    }

    workspace.innerHTML = `
      <div class="top">
        <div>
          <div class="eyebrow">Recovery area</div>
          <h1 class="serif" style="margin:0;font-size:37px">Deleted records</h1>
        </div>
      </div>

      <div class="card" style="margin-top:29px">
        <div class="card-head">
          <h2>Bin</h2>
          <span>Records are removed permanently after 10 days</span>
        </div>

        <div id="binRecords"></div>
      </div>
    `;

    const binRecords = document.getElementById("binRecords");

    trash.forEach(record => {
      const daysLeft = Math.max(
        0,
        Math.ceil((TEN_DAYS - (Date.now() - record.deletedAt)) / (24 * 60 * 60 * 1000))
      );

      const item = document.createElement("div");
      item.style.cssText =
        "padding:17px 20px;border-bottom:1px solid var(--cream);display:flex;justify-content:space-between;align-items:center;gap:16px;";

      const details = document.createElement("div");
      details.innerHTML = `
        <strong style="display:block;margin-bottom:4px">${esc(record.name)}</strong>
        <small style="color:var(--muted)">Available to restore for ${daysLeft} day${daysLeft === 1 ? "" : "s"}</small>
      `;

      const restoreButton = document.createElement("button");
      restoreButton.className = "primary";
      restoreButton.type = "button";
      restoreButton.textContent = "Restore";

      restoreButton.addEventListener("click", () => {
        const recordIndex = trash.findIndex(item => item.id === record.id);

        if (recordIndex === -1) return;

        const [restoredRecord] = trash.splice(recordIndex, 1);
        delete restoredRecord.deletedAt;

        restoredRecord.updated = "Restored " + new Date().toLocaleDateString(
          undefined,
          { month: "short", day: "numeric", year: "numeric" }
        );

        clients.unshift(restoredRecord);
        saveTrash();
        save();
        openClient(restoredRecord.id);
      });

      item.append(details, restoreButton);
      binRecords.appendChild(item);
    });
  }

  function installBinButton() {
    if (document.getElementById("openBinButton")) return;

    const binButton = document.createElement("button");
    binButton.id = "openBinButton";
    binButton.type = "button";
    binButton.className = "secondary";
    binButton.style.cssText = "width:100%;margin-top:10px;";
    binButton.addEventListener("click", showBin);

    document.getElementById("newBtn").insertAdjacentElement("afterend", binButton);
    refreshBinButton();
  }

  // Add styling without altering the existing stylesheet.
  const style = document.createElement("style");
  style.textContent = `
    #addMeasurementOption {
      margin-top: 16px;
      padding: 9px 0;
      border: 0;
      background: transparent;
      color: var(--accent);
      font-weight: bold;
      cursor: pointer;
    }

    #addMeasurementOption:hover {
      color: var(--deep);
    }

    @media (max-width: 700px) {
      #openBinButton {
        width: auto !important;
        margin: 0 !important;
      }
    }
  `;
  document.head.appendChild(style);

  // Detect whenever a client card is opened and add the measurement button.
  const workspace = document.getElementById("workspace");
  new MutationObserver(installMeasurementButton).observe(workspace, {
    childList: true,
    subtree: true
  });

  purgeExpiredTrash();
  installBinButton();

  // Refresh the first opened client so saved custom fields appear immediately.
  if (currentId) {
    openClient(currentId);
  }

  installMeasurementButton();
})();
</script>
</body>
</html>
