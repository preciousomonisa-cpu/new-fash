<body>
  <header><div class="brand">Dora <span>Notes</span></div><div class="save-state"><i class="dot"></i><span id="saveStatus">Saved on this device</span></div></header>
  <main>
    <aside><button class="new-client" id="newBtn">+ New client</button><input class="search" id="search" placeholder="Search clients" /><div class="label">Your clients</div><div id="clientList"></div></aside>
    <section id="workspace"><div class="placeholder"><h1>Your fitting room, organized.</h1><p>Create a client card to record measurements, sketch looks, and keep your atelier notes together.</p></div></section>
  </main>
  <div class="modal" id="modal"><div class="modal-box"><h2>New client</h2><p>Start a lasting record for a new fitting.</p><input id="newName" placeholder="Client's full name" autofocus /><div class="modal-actions"><button class="secondary" id="cancel">Cancel</button><button class="primary" id="create">Create card</button></div></div></div>
  <script>
    const KEY='atelier-notes-v1'; let clients=JSON.parse(localStorage.getItem(KEY)||'[]'); let currentId=null, drawing=false, ctx, canvas, last={x:0,y:0};
    const measures=['Bust','Waist','Hip','Shoulder','Arm length','Bicep','Neck','Back length','Inseam','Outseam','Thigh','Wrist'];
    const esc=s=>String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
    function save(){localStorage.setItem(KEY,JSON.stringify(clients));document.getElementById('saveStatus').textContent='Saved on this device';renderList();}
    function current(){return clients.find(c=>c.id===currentId)}
    function renderList(){const q=document.getElementById('search').value.toLowerCase();const list=document.getElementById('clientList');const view=clients.filter(c=>c.name.toLowerCase().includes(q));list.innerHTML=view.length?view.map(c=>`<button class="client-item ${c.id===currentId?'active':''}" data-id="${c.id}"><b>${esc(c.name)}</b><small>${c.updated||'New record'}</small></button>`).join(''):'<div class="empty-list">No client records yet.</div>';list.querySelectorAll('[data-id]').forEach(b=>b.onclick=()=>openClient(b.dataset.id));}
    function openClient(id){currentId=id;const c=current(); document.getElementById('workspace').innerHTML=`<div class="top"><div><div class="eyebrow">Client fitting record</div><input class="title-input" id="title" value="${esc(c.name)}" /></div><div class="actions"><button class="secondary" id="delete">Delete</button><button class="primary" id="save">Save record</button></div></div><div class="grid"><div><div class="card"><div class="card-head"><h2>Client details</h2><span>Fitting & contact</span></div><div class="client-form"><div class="field"><label>Phone</label><input id="phone" value="${esc(c.phone)}" placeholder="+234 …" /></div><div class="field"><label>Email</label><input id="email" value="${esc(c.email)}" placeholder="client@email.com" /></div><div class="field"><label>Garment type</label><input id="garment" value="${esc(c.garment)}" placeholder="e.g. Evening gown" /></div><div class="field"><label>Fitting date</label><input id="date" type="date" value="${esc(c.date)}" /></div><div class="field full"><label>Style notes</label><textarea id="style" placeholder="Fabric, colour preferences, fit notes…">${esc(c.style)}</textarea></div></div></div><div class="card" style="margin-top:26px"><div class="card-head"><h2>Measurements</h2><span>in centimeters</span></div><div class="measurements"><div class="measure-grid">${measures.map(m=>`<div class="unit"><label>${m}</label><input data-measure="${m}" inputmode="decimal" value="${esc(c.measurements[m])}" placeholder="—"/><em>cm</em></div>`).join('')}</div></div></div></div><div><div class="card"><div class="card-head"><h2>Design sketch</h2><span>Draw directly on the page</span></div><div class="sketch-tools"><div class="tool-group"><label>Ink</label><input id="color" type="color" value="#49342d"><label>Line</label><input id="size" type="range" min="1" max="14" value="3"></div><button class="clear" id="clear">Clear sketch</button></div><div class="canvas-wrap"><div class="canvas-box"><canvas id="canvas"></canvas></div></div><div class="sketch-foot">Tip: use a stylus, mouse, or finger to sketch.</div></div><div class="card notes"><div class="card-head"><h2>Atelier notes</h2><span>Private to your studio</span></div><textarea id="notes" placeholder="Alterations, fittings, delivery notes…">${esc(c.notes)}</textarea></div></div></div>`; renderList();bind();}
    function bind(){document.getElementById('save').onclick=saveCurrent;document.getElementById('delete').onclick=deleteCurrent;canvas=document.getElementById('canvas');setupCanvas();['pointerdown','pointermove','pointerup','pointerleave'].forEach(e=>canvas.addEventListener(e,draw));document.getElementById('clear').onclick=()=>{ctx.clearRect(0,0,canvas.width,canvas.height);saveSketch();};}
    function setupCanvas(){const box=canvas.parentElement, r=box.getBoundingClientRect(), c=current();canvas.width=Math.round(r.width*devicePixelRatio);canvas.height=Math.round(r.height*devicePixelRatio);ctx=canvas.getContext('2d');ctx.scale(devicePixelRatio,devicePixelRatio);if(c.sketch){let im=new Image();im.onload=()=>ctx.drawImage(im,0,0,r.width,r.height);im.src=c.sketch;}}
    function pos(e){let r=canvas.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top}}
    function draw(e){if(e.type==='pointerdown'){drawing=true;last=pos(e);canvas.setPointerCapture(e.pointerId);return}if(!drawing)return;if(e.type==='pointerup'||e.type==='pointerleave'){drawing=false;saveSketch();return}let p=pos(e);ctx.beginPath();ctx.moveTo(last.x,last.y);ctx.lineTo(p.x,p.y);ctx.strokeStyle=document.getElementById('color').value;ctx.lineWidth=document.getElementById('size').value;ctx.lineCap='round';ctx.stroke();last=p;}
    function saveSketch(){if(current())current().sketch=canvas.toDataURL('image/png');}
    function saveCurrent(){const c=current();c.name=document.getElementById('title').value.trim()||'Untitled client';['phone','email','garment','date','style','notes'].forEach(k=>c[k]=document.getElementById(k).value);c.measurements={};document.querySelectorAll('[data-measure]').forEach(i=>c.measurements[i.dataset.measure]=i.value);c.updated='Updated '+new Date().toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'});save();}
    function deleteCurrent(){if(confirm(`Delete ${current().name}'s record? This cannot be undone.`)){clients=clients.filter(c=>c.id!==currentId);currentId=null;save();document.getElementById('workspace').innerHTML='<div class="placeholder"><h1>Record removed.</h1><p>Create or select a client to continue.</p></div>';}}
    document.getElementById('newBtn').onclick=()=>{document.getElementById('modal').classList.add('show');setTimeout(()=>document.getElementById('newName').focus(),0)};document.getElementById('cancel').onclick=()=>document.getElementById('modal').classList.remove('show');function create(){let n=document.getElementById('newName');let name=n.value.trim();if(!name)return n.focus();let c={id:crypto.randomUUID(),name,phone:'',email:'',garment:'',date:new Date().toISOString().slice(0,10),style:'',notes:'',measurements:{},sketch:'',updated:'Just now'};clients.unshift(c);currentId=c.id;n.value='';document.getElementById('modal').classList.remove('show');save();openClient(c.id);}document.getElementById('create').onclick=create;document.getElementById('newName').onkeydown=e=>{if(e.key==='Enter')create()};document.getElementById('search').oninput=renderList;renderList();if(clients.length)openClient(clients[0].id);
  </script>
</body>
