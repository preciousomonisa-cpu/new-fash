<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adora Notes</title>
  <style>
    :root { --ink:#27231f; --paper:#f9f6f0; --cream:#eee7dc; --accent:#b65f47; --deep:#743b2c; --line:#ddd3c5; --muted:#797069; --white:#fffdf9; }
    * { box-sizing:border-box; } body { margin:0; color:var(--ink); font-family:Arial, sans-serif; background:var(--paper); }
    .serif { font-family:Georgia, 'Times New Roman', serif; }
    header { min-height:78px; display:flex; align-items:center; justify-content:space-between; padding:0 clamp(18px,4vw,42px); border-bottom:1px solid var(--line); background:#fcfaf6; }
    .brand { font:700 27px Georgia,serif; letter-spacing:-1px; } .brand span { color:var(--accent); font-style:italic; font-weight:400; }
    .save-state { font-size:13px; color:var(--muted); display:flex; align-items:center; gap:8px; }.dot{width:8px;height:8px;border-radius:50%;background:#6d9873;}
    main { display:grid; grid-template-columns:270px minmax(0,1fr); min-height:calc(100vh - 78px); }
    aside { padding:28px 20px; border-right:1px solid var(--line); background:#f4efe7; }
    .new-client { width:100%; border:0; border-radius:5px; background:var(--accent); color:white; padding:13px; font-weight:bold; cursor:pointer; font-size:14px; }
    .new-client:hover,.primary:hover { background:var(--deep); }
    .search { width:100%; margin:22px 0 14px; border:1px solid var(--line); border-radius:5px; padding:11px; background:var(--white); color:var(--ink); }
    .label { color:var(--muted); font-size:11px; font-weight:bold; letter-spacing:1px; text-transform:uppercase; margin:13px 9px 8px; }
    #clientList { display:grid; gap:5px; }.client-item { width:100%; border:0; background:transparent; text-align:left; padding:12px 10px; border-radius:5px; cursor:pointer; color:var(--ink); }.client-item:hover,.client-item.active { background:#e5d8cc; }.client-item b{display:block;font-size:14px}.client-item small{color:var(--muted);font-size:12px}
    .empty-list { font-size:13px; color:var(--muted); padding:12px 9px; line-height:1.5; }
    section { padding:clamp(24px,4vw,48px) clamp(18px,5vw,48px) 60px; max-width:1320px; width:100%; margin:auto; }.top { display:flex; justify-content:space-between; align-items:start; gap:20px; }.eyebrow { font-size:11px; letter-spacing:1.3px; color:var(--accent); font-weight:bold; text-transform:uppercase; margin-bottom:8px; }.title-input { border:0; border-bottom:1px solid transparent; background:transparent; font:700 clamp(29px,4vw,37px) Georgia,serif; color:var(--ink); padding:0; width:500px; max-width:100%; }.title-input:focus{outline:none;border-color:var(--line)}
    .actions { display:flex; flex-wrap:wrap; gap:10px; }.secondary,.primary { cursor:pointer; border-radius:5px; padding:10px 13px; font-size:13px; font-weight:bold; min-height:40px; }.secondary { border:1px solid var(--line); background:var(--white); color:var(--ink); }.primary { border:0; background:var(--accent); color:white; }
    .grid { display:grid; grid-template-columns:minmax(0,.95fr) minmax(0,1.25fr); gap:clamp(18px,3vw,26px); margin-top:29px; }.card { min-width:0; background:var(--white); border:1px solid var(--line); border-radius:8px; overflow:hidden; }.card-head { padding:18px 20px 15px; border-bottom:1px solid var(--cream); display:flex; align-items:center; justify-content:space-between; gap:12px; }.card-head h2{margin:0;font:700 20px Georgia,serif}.card-head span{font-size:12px;color:var(--muted);text-align:right}
    .client-form { padding:18px 20px; display:grid; grid-template-columns:1fr 1fr; gap:14px; }.field { display:grid; gap:6px; }.field.full{grid-column:1/-1}.field label,.measurements label{font-size:11px;letter-spacing:.8px;text-transform:uppercase;font-weight:bold;color:var(--muted)} input,textarea,select { font:14px Arial,sans-serif; color:var(--ink); border:1px solid var(--line); border-radius:4px; padding:10px; background:#fffefa; width:100%; } textarea { resize:vertical; min-height:74px; }.measurements { padding:19px 20px 22px; }.measurements h3 { margin:0 0 15px;font:700 18px Georgia,serif; }.measure-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }.unit { position:relative; }.unit input{padding-right:28px}.unit em{position:absolute;right:10px;bottom:11px;color:var(--muted);font-size:11px;font-style:normal}
    .sketch-tools { padding:10px 16px; display:flex; align-items:center; justify-content:space-between; background:#fcfaf6; border-bottom:1px solid var(--cream); }.tool-group{display:flex;align-items:center;gap:10px}.tool-group label{font-size:12px;color:var(--muted)} #color{height:30px;width:36px;padding:2px;border-radius:4px} #size{width:86px}.clear{border:0;background:transparent;color:var(--accent);font-weight:bold;cursor:pointer;font-size:12px}.canvas-wrap { padding:16px; background:#f7f2ea; }.canvas-box { background:white; border:1px solid var(--line); border-radius:4px; overflow:hidden; aspect-ratio:1.25; } canvas { display:block; width:100%; height:100%; cursor:crosshair; touch-action:none; }.sketch-foot{padding:12px 17px;color:var(--muted);font-size:12px;}
    .notes { margin-top:26px; }.notes textarea{min-height:104px;border:0;padding:18px;line-height:1.55}.placeholder { text-align:center; padding:92px 20px; color:var(--muted); }.placeholder h1{font:700 31px Georgia,serif;color:var(--ink);margin:0 0 10px}.modal { position:fixed;inset:0;background:rgba(39,35,31,.36);display:none;align-items:center;justify-content:center;padding:20px; }.modal.show{display:flex}.modal-box{width:390px;background:var(--white);padding:28px;border-radius:9px;box-shadow:0 20px 60px #34261d55}.modal-box h2{font:700 25px Georgia,serif;margin:0 0 9px}.modal-box p{font-size:14px;color:var(--muted);line-height:1.5}.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:18px}
    @media(max-width:980px){main{grid-template-columns:1fr}aside{border-right:0;border-bottom:1px solid var(--line);padding:14px 18px;display:grid;grid-template-columns:auto minmax(170px,260px) minmax(0,1fr);gap:12px;align-items:center}.new-client{width:auto;padding:11px 14px;white-space:nowrap}.search{margin:0;width:100%}.label{display:none}#clientList{display:flex;gap:7px;overflow-x:auto;min-width:0;padding:2px 0;scrollbar-width:thin}.client-item{width:auto;min-width:max-content;padding:8px 11px}.client-item small{display:none}.grid{grid-template-columns:minmax(0,1fr) minmax(0,1fr)}}
    @media(max-width:700px){header{min-height:62px;height:auto;padding:12px 14px;flex-wrap:wrap;gap:8px}header .secondary{margin-left:0!important;font-size:12px}.brand{font-size:23px}.save-state{font-size:11px;margin-left:auto}.dot{width:7px;height:7px}aside{grid-template-columns:auto minmax(0,1fr);padding:12px}.new-client{font-size:13px}#clientList{grid-column:1/-1}.top{flex-direction:column;gap:16px}.actions{width:100%}.actions button{flex:1}.grid{grid-template-columns:1fr;margin-top:22px}.client-form{grid-template-columns:1fr}.measure-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.canvas-wrap{padding:10px}.sketch-tools{padding:10px;align-items:flex-start;gap:8px}.tool-group{gap:7px;flex-wrap:wrap}.sketch-foot{font-size:11px}.notes{margin-top:18px}}
    @media(max-width:390px){header{padding:0 14px}.save-state span{display:none}section{padding-left:14px;padding-right:14px}.card-head{padding:15px}.card-head h2{font-size:18px}.card-head span{display:none}.client-form,.measurements{padding:15px}.measure-grid{grid-template-columns:1fr}.modal{padding:14px}.modal-box{padding:22px;width:100%}.modal-actions button{flex:1}.sketch-tools{flex-direction:column}.clear{padding:5px 0}.canvas-box{aspect-ratio:1}}

    /* Optional style-reference photo */
.style-reference { margin-top:26px; }
.reference-body { padding:16px; display:grid; grid-template-columns:120px 1fr; gap:14px; align-items:start; }
.reference-preview { width:120px; aspect-ratio:4/5; border:1px dashed var(--line); border-radius:5px; overflow:hidden; background:var(--cream); display:grid; place-items:center; color:var(--muted); font-size:12px; text-align:center; padding:10px; }
.reference-preview img { width:100%; height:100%; object-fit:cover; }
.reference-controls { display:grid; gap:8px; }
.reference-controls p { margin:0; color:var(--muted); font-size:12px; line-height:1.45; }
#referencePhoto { display:none; }

/* Cloud-backup indicator */
.cloud-indicator { display:flex; align-items:center; gap:7px; font-size:12px; color:var(--muted); white-space:nowrap; }
.cloud-indicator .dot { background:#a8925e; }
.cloud-indicator.synced .dot { background:#6d9873; }
.cloud-indicator.syncing .dot { background:#d69a3f; }
.cloud-indicator.error .dot { background:#b65f47; }

@media print {
  header, aside, .actions, .sketch-tools, .clear, .reference-controls {
    display:none !important;
  }
  main { display:block; min-height:0; }
  section { max-width:none; padding:0; }
  .grid { grid-template-columns:1fr 1fr; }
  .card { break-inside:avoid; }
}
  </style>
</head>
<body>
  <header>
  <div class="brand">Adora <span>Notes</span></div>

  <div class="save-state">
    <i class="dot"></i>
    <span id="saveStatus">Saved on this device</span>
  </div>

  <div class="cloud-indicator" id="cloudIndicator">
    <i class="dot"></i>
    <span id="cloudIndicatorText">Cloud backup not connected</span>
  </div>
</header>
  <!-- <header><div class="brand">Adora <span>Notes</span></div><div class="save-state"><i class="dot"></i><span id="saveStatus">Saved on this device</span></div></header> -->
  <main>
    <aside><button class="new-client" id="newBtn">+ New client</button><input class="search" id="search" placeholder="Search clients" /><div class="label">Your clients</div><div id="clientList"></div></aside>
    <section id="workspace"><div class="placeholder"><h1>Your fitting room, organized.</h1><p>Create a client card to record measurements, sketch looks, and keep your Adora notes together.</p></div></section>
  </main>
  <div class="modal" id="modal"><div class="modal-box"><h2>New client</h2><p>Start a lasting record for a new fitting.</p><input id="newName" placeholder="Client's full name" autofocus /><div class="modal-actions"><button class="secondary" id="cancel">Cancel</button><button class="primary" id="create">Create card</button></div></div></div>
  <script>
    let KEY = "Adora-notes";

let clients = []; let currentId=null, drawing=false, ctx, canvas, last={x:0,y:0};
    const measures=['Bust','Waist','Hip','Shoulder','Arm length','Bicep','Neck','Back length','Inseam','Outseam','Thigh','Wrist'];
    const esc=s=>String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
    function save(){localStorage.setItem(KEY,JSON.stringify(clients));document.getElementById('saveStatus').textContent='Saved on this device';renderList();}
    function current(){return clients.find(c=>c.id===currentId)}
    function renderList(){const q=document.getElementById('search').value.toLowerCase();const list=document.getElementById('clientList');const view=clients.filter(c=>c.name.toLowerCase().includes(q));list.innerHTML=view.length?view.map(c=>`<button class="client-item ${c.id===currentId?'active':''}" data-id="${c.id}"><b>${esc(c.name)}</b><small>${c.updated||'New record'}</small></button>`).join(''):'<div class="empty-list">No client records yet.</div>';list.querySelectorAll('[data-id]').forEach(b=>b.onclick=()=>openClient(b.dataset.id));}
    function openClient(id){currentId=id;const c=current(); document.getElementById('workspace').innerHTML=`<div class="top"><div><div class="eyebrow">Client fitting record</div><input class="title-input" id="title" value="${esc(c.name)}" /></div><div class="actions">
  <button class="secondary" id="pdf">PDF client sheet</button>
  <button class="secondary" id="delete">Delete</button>
  <button class="primary" id="save">Save record</button>
</div></div><div class="grid"><div><div class="card"><div class="card-head"><h2>Client details</h2><span>Fitting & contact</span></div><div class="client-form"><div class="field"><label>Phone</label><input id="phone" value="${esc(c.phone)}" placeholder="+234 …" /></div><div class="field"><label>Email</label><input id="email" value="${esc(c.email)}" placeholder="client@email.com" /></div><div class="field"><label>Garment type</label><input id="garment" value="${esc(c.garment)}" placeholder="e.g. Evening gown" /></div><div class="field"><label>Fitting date</label><input id="date" type="date" value="${esc(c.date)}" /></div><div class="field full"><label>Style notes</label><textarea id="style" placeholder="Fabric, colour preferences, fit notes…">${esc(c.style)}</textarea></div></div></div><div class="card" style="margin-top:26px"><div class="card-head"><h2>Measurements</h2><span>in centimeters</span></div><div class="measurements"><div class="measure-grid">${measures.map(m=>`<div class="unit"><label>${m}</label><input data-measure="${m}" inputmode="decimal" value="${esc(c.measurements[m])}" placeholder="—"/><em>cm</em></div>`).join('')}</div></div></div></div><div class="card style-reference">
  <div class="card-head">
    <h2>Style reference</h2>
    <span>Optional picture</span>
  </div>

  <div class="reference-body">
    <div class="reference-preview" id="referencePreview">
      ${c.referenceImage
        ? `<img src="${esc(c.referenceImage)}" alt="Client style reference" />`
        : 'No reference picture yet'}
    </div>

    <div class="reference-controls">
      <p>Add an inspiration image, fabric photo, or finished-look reference for this client.</p>
      <input id="referenceCaption" value="${esc(c.referenceCaption)}" placeholder="e.g. Emerald satin gown inspiration" />
      <input id="referencePhoto" type="file" accept="image/*" />
      <button class="secondary" id="chooseReference" type="button">
        ${c.referenceImage ? 'Change picture' : 'Add picture'}
      </button>
    </div>
  </div>
</div>
<div><div class="card"><div class="card-head"><h2>Design sketch</h2><span>Draw directly on the page</span></div><div class="sketch-tools"><div class="tool-group"><label>Ink</label><input id="color" type="color" value="#49342d"><label>Line</label><input id="size" type="range" min="1" max="14" value="3"></div><button class="clear" id="clear">Clear sketch</button></div><div class="canvas-wrap"><div class="canvas-box"><canvas id="canvas"></canvas></div></div><div class="sketch-foot">Tip: use a stylus, mouse, or finger to sketch.</div></div><div class="card notes"><div class="card-head"><h2>Adora notes</h2><span>Private to your studio</span></div><textarea id="notes" placeholder="Alterations, fittings, delivery notes…">${esc(c.notes)}</textarea></div></div></div>`; renderList();bind();}
    function bind() {
  document.getElementById('save').onclick = saveCurrent;
  document.getElementById('delete').onclick = deleteCurrent;
  document.getElementById('pdf').onclick = exportClientPDF;

  document.getElementById('chooseReference').onclick =
    () => document.getElementById('referencePhoto').click();

  document.getElementById('referencePhoto').onchange = addReferencePhoto;

  canvas = document.getElementById('canvas');
  setupCanvas();

  ['pointerdown','pointermove','pointerup','pointerleave']
    .forEach(e => canvas.addEventListener(e, draw));

  document.getElementById('clear').onclick = () => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    saveSketch();
  };
}
    function setupCanvas(){const box=canvas.parentElement, r=box.getBoundingClientRect(), c=current();canvas.width=Math.round(r.width*devicePixelRatio);canvas.height=Math.round(r.height*devicePixelRatio);ctx=canvas.getContext('2d');ctx.scale(devicePixelRatio,devicePixelRatio);if(c.sketch){let im=new Image();im.onload=()=>ctx.drawImage(im,0,0,r.width,r.height);im.src=c.sketch;}}
    function pos(e){let r=canvas.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top}}
    function draw(e){if(e.type==='pointerdown'){drawing=true;last=pos(e);canvas.setPointerCapture(e.pointerId);return}if(!drawing)return;if(e.type==='pointerup'||e.type==='pointerleave'){drawing=false;saveSketch();return}let p=pos(e);ctx.beginPath();ctx.moveTo(last.x,last.y);ctx.lineTo(p.x,p.y);ctx.strokeStyle=document.getElementById('color').value;ctx.lineWidth=document.getElementById('size').value;ctx.lineCap='round';ctx.stroke();last=p;}
    function saveSketch(){if(current())current().sketch=canvas.toDataURL('image/png');}
    function saveCurrent(){const c=current();c.name=document.getElementById('title').value.trim()||'Untitled client';['phone','email','garment','date','style','notes'].forEach(k=>c[k]=document.getElementById(k).value);c.measurements={};document.querySelectorAll('[data-measure]').forEach(i=>c.measurements[i.dataset.measure]=i.value);
    c.referenceCaption = document.getElementById('referenceCaption').value;c.updated='Updated '+new Date().toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'});save();}
    function addReferencePhoto(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = () => {
    current().referenceImage = reader.result;

    document.getElementById('referencePreview').innerHTML =
      `<img src="${reader.result}" alt="Client style reference" />`;

    document.getElementById('chooseReference').textContent = 'Change picture';
    document.getElementById('saveStatus').textContent =
      'Picture added — save record';
  };

  reader.readAsDataURL(file);
}

function exportClientPDF() {
  const name = document.getElementById('title').value.trim() || 'client';
  document.title = `${name} — Client Sheet`;
  window.print();
}
    function deleteCurrent(){if(confirm(`Delete ${current().name}'s record? This cannot be undone.`)){clients=clients.filter(c=>c.id!==currentId);currentId=null;save();document.getElementById('workspace').innerHTML='<div class="placeholder"><h1>Record removed.</h1><p>Create or select a client to continue.</p></div>';}}
    document.getElementById('newBtn').onclick=()=>{document.getElementById('modal').classList.add('show');setTimeout(()=>document.getElementById('newName').focus(),0)};document.getElementById('cancel').onclick=()=>document.getElementById('modal').classList.remove('show');function create(){let n=document.getElementById('newName');let name=n.value.trim();if(!name)return n.focus();let c={id:crypto.randomUUID(),name,phone:'',email:'',garment:'',date:new Date().toISOString().slice(0,10),style:'',notes:'',measurements:{},sketch:'',
referenceImage:'',referenceCaption:'',updated:'Just now'};clients.unshift(c);currentId=c.id;n.value='';document.getElementById('modal').classList.remove('show');save();openClient(c.id);}document.getElementById('create').onclick=create;document.getElementById('newName').onkeydown=e=>{if(e.key==='Enter')create()};document.getElementById('search').oninput=renderList;renderList();if(clients.length)openClient(clients[0].id);
  </script>

  <script>

    (() => {

      const SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_GOVQ-RhGFDECrDyJ0xkSGw_uzr7yB_G';
      const CLOUD_TABLE = 'Adora_clients';

      const cloudButton = document.createElement('button');

      cloudButton.style.cssText = 'margin-left:14px;min-height:34px;padding:7px 10px;white-space:nowrap;';
      document.querySelector('header').appendChild(cloudButton);

      const resendButton = document.createElement('button');

      document.querySelector('header').appendChild(resendButton);

      function setCloudIndicator(state, label) {
  const indicator = document.getElementById('cloudIndicator');
  const text = document.getElementById('cloudIndicatorText');

  indicator.className = `cloud-indicator ${state}`;
  text.textContent = label;
}

      function setCloudStatus(message) {
  document.getElementById('saveStatus').textContent = message;

  if (message.includes('Syncing')) {
    setCloudIndicator('syncing', 'Cloud backup syncing');
  } else if (message.includes('Synced')) {
    setCloudIndicator('synced', 'Cloud backup up to date');
  } else if (message.includes('attention')) {
    setCloudIndicator('error', 'Cloud backup needs attention');
  }
}

      function setCloudButton(session) {
        cloudButton.textContent = session ? 'Cloud: signed in' : 'Cloud sign in';
      }

      async function getSession() {

    if (!supabaseClient) return null;

    const { data } = await supabaseClient.auth.getSession();

    if (data.session) {

        KEY = "Adora-notes-" + data.session.user.id;

        clients = JSON.parse(
            localStorage.getItem(KEY) || "[]"
        );

    }

    return data.session;

}
      }

      async function uploadCloud() {
        const session = await getSession();
        console.log("Current session:", session);
console.log("Clients to upload:", clients);
        if (!session || !clients.length) return;

        const now = new Date().toISOString();

console.log("Preparing rows for upload...");
        const rows = clients.map(client => {

    // Ensure every client has an updated_at timestamp
    client.updated_at = client.updated_at || now;

    return {
        id: client.id,
        user_id: session.user.id,
        payload: client,
        updated_at: client.updated_at
    };

});

        const { data, error } = await supabaseClient
    .from(CLOUD_TABLE)
    .upsert(rows, {
        onConflict: 'id,user_id'
    });

console.log("Uploaded rows:", data);

if (error) {
    console.error("Supabase upload error:", error);
    throw error;
}

        // Everything uploaded successfully
        hasUnsyncedChanges = false;
      }

      async function downloadCloud() {
        const session = await getSession();
        if (!session) return;

        const { data, error } = await supabaseClient
  .from(CLOUD_TABLE)
  .select('id, payload, updated_at')
  .eq('user_id', session.user.id)
  .order('updated_at', { ascending: false });

        if (error) throw error;

        // Create a map of local clients
const mergedClients = new Map();

clients.forEach(client => {
    mergedClients.set(client.id, client);
});

// Merge cloud clients
(data || []).forEach(row => {

    const cloudClient = row.payload;
    const localClient = mergedClients.get(cloudClient.id);

    // If the client doesn't exist locally, add it

    }

    // Compare timestamps if they exist
    const localTime = new Date(localClient.updated_at || 0).getTime();
    const cloudTime = new Date(cloudClient.updated_at || row.updated_at || 0).getTime();

    // Keep the newest version
    if (cloudTime > localTime) {
        mergedClients.set(cloudClient.id, cloudClient);
    }

});

clients = [...mergedClients.values()];

localSave();

     async function syncCloud() {
    try {

        setCloudStatus('Syncing securely…');

        const session = await getSession();

        if (!session) {
            setCloudStatus('Please sign in');
            return;
        }

        // Download the latest data from Supabase
        await downloadCloud();

        // Save the merged data locally
        localStorage.setItem(KEY, JSON.stringify(clients));
        renderList();

if (currentId) {
    openClient(currentId);
}

        // Upload only if there are unsynced local changes
        if (hasUnsyncedChanges) {
            await uploadCloud();
        }

        setCloudStatus('Synced to your private cloud');

    } catch (error) {

        console.error(error);

        setCloudStatus('Cloud sync needs attention');

    }
}
      function queueCloudSync() {
        clearTimeout(cloudTimer);
        cloudTimer = setTimeout(syncCloud, 700);
      }

      let hasUnsyncedChanges = false;

const localSave = save;

save = function () {

    localSave();

    hasUnsyncedChanges = true;

    if (supabaseClient) {
        queueCloudSync();
    }

};
      const localDelete = deleteCurrent;
      deleteCurrent = function () {
        const deletedId = currentId;
        localDelete();

        if (deletedId && !clients.some(client => client.id === deletedId) && supabaseClient) {
          getSession().then(session => {
            if (!session) return;
            return supabaseClient.from(CLOUD_TABLE).delete().eq('id', deletedId);
          }).then(({ error } = {}) => {
            if (error) console.error(error);
          });
        }
      };

      async function signInOrCreateAccount() {
        const email = prompt('Email address for cloud backup:');
        if (!email) return;
        const password = prompt('Password (at least 6 characters):');
        if (!password) return;

        const createAccount = confirm('Create a new account?\n\nChoose Cancel if you already have one and want to sign in.');
        const result = createAccount
          ? await supabaseClient.auth.signUp({ email, password })
          : await supabaseClient.auth.signInWithPassword({ email, password });

        if (result.error) {
          alert(result.error.message);
          return;
        }

        if (!result.data.session) {
          alert('Check your email to confirm your account, then return here and sign in.');
          return;
        }

        setCloudButton(result.data.session);
        await syncCloud();
      }

      async function resendConfirmation() {
        if (!configured) {
          alert('Add your Supabase URL and publishable/anon key first.');
          return;
          setCloudIndicator('', 'Cloud backup not configured');
        }

        const email = prompt('Enter the email address you used to create your cloud account:');
        if (!email) return;

        const { error } = await supabaseClient.auth.resend({
          type: 'signup',
          email
        });

        if (error) {
          alert(error.message);
          return;
        }

        alert('A fresh confirmation email has been sent. Open the newest link in your inbox.');
      }

      cloudButton.addEventListener('click', async () => {
        if (!configured) {
          alert('Add your Supabase URL and publishable/anon key in the cloud-sync section of this file first.');
          return;
        }

        const session = await getSession();
        if (session) {
          if (confirm('Sign out from cloud backup on this device?')) {
            await supabaseClient.auth.signOut({ scope: 'local' });
            setCloudButton(null);
            setCloudStatus('Saved on this device');
          }
          return;
        }

        await signInOrCreateAccount();
      });

      resendButton.addEventListener('click', resendConfirmation);

      if (!configured) {
        setCloudButton(null);
        return;
      }

      supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY, {
        auth: { persistSession: true, autoRefreshToken: true }
      });

      supabaseClient.auth.onAuthStateChange(async (_event, session) => {

    setCloudButton(session);

    if (!session) {

        clients = [];
        currentId = null;

        localStorage.removeItem(KEY);

        renderList();

        document.getElementById("workspace").innerHTML =
        '<div class="placeholder"><h1>Please sign in.</h1></div>';

        return;
    }

    clients = [];
    currentId = null;

    await downloadCloud();

    renderList();

    if (clients.length) {

        openClient(clients[0].id);

    }

});

      getSession().then(session => {
        setCloudButton(session);
        if (session) syncCloud();
      });
    })();
  </script>
</body>
</html>
